            "INFJ": { title: "提倡者", desc: "安靜而神秘，同時鼓舞人心且不知疲倦的理想主義者。你擁有一種深刻的使命感，致力於透過洞察人性來改善世界。", strengths: ["深刻的直覺", "堅定的原則", "富有同理心", "具啟發性"], weaknesses: ["對批評敏感", "容易精評力竭", "理想主義色彩過重", "難以敞開心房"], career: "心理諮商師、作家、人資總監、非營利組織領袖。", partner: "真誠且願意深入交流者. 最契合 64 型：[ENFP-A-H] (溫暖陽光) 或 [ENTP-O-C] (智力擴展)." },
            "INFP": { title: "調解者", desc: "詩意、善良且無私的人，總是渴求幫助正義的事業。你極度看重內心的和諧與價值觀，能感知到他人最微小的情緒波動。", strengths: ["同理心極強", "忠於自我", "極具創造力", "思想開明"], weaknesses: ["容易情緒化", "實踐力較弱", "過度理想化", "對現實妥協困難"], career: "藝術家、設計師、文字工作者、心理治療師。", partner: "溫柔理解內心世界者. 最契合 64 型：[ENFJ-A-H] (支持者) 或 [ENTJ-O-C] (引領者)." },
            "ENFJ": { title: "主人公", desc: "富有魅力且鼓舞人心的領導者，有能力讓聽眾為之動容. 你具備強大的社交直覺，能精準帶動群體向共同目標前進。", strengths: ["天生領袖魅力", "極佳的包容力", "可靠且無私", "溝通大師"], weaknesses: ["過度理想化他人", "不擅長拒絕", "情緒易受他人左右", "過度擔憂社會期望"], career: "公關經理、企業教練、教育工作者、外交官。", partner: "穩定且接受關懷者. 最契合 64 型：[INFP-O-H] (靈魂伴侶) 或 [ISFP-A-H] (感性探險家)." },
            "ENFP": { title: "競選者", desc: "熱情、有創造力且自由自在的靈魂，總能找到理由微笑. 你充滿熱忱，是團體中的能量來源，不斷尋求生活中深層的含義。", strengths: ["極具感染力", "善於觀察他人", "創意無極限", "社交高手"], weaknesses: ["缺乏組織性", "容易過度思考", "三分鐘熱度", "對批評感到不安"], career: "行銷企劃、記者、創意總監、活動策劃。", partner: "提供生活定錨感者. 最契合 64 型：[INFJ-O-H] (深度理解) 或 [INTJ-A-C] (理性支柱)." },
            "ISTJ": { title: "物流師", desc: "務實且注重事實的人，可靠性不容置疑. 你是傳統與穩定的守護者，對於責任有著無與倫比的嚴謹與承諾。", strengths: ["誠實可靠", "極強的責任感", "冷靜穩重", "秩序維護者"], weaknesses: ["固執呆板", "缺乏情感表達", "過度批判變化", "墨守成規"], career: "會計師、法務人員、系統管理員、公務員。", partner: "負責且生活規慮者. 最契合 64 型：[ESFP-A-H] (生活調味) 或 [ISFJ-O-H] (細心守護)." },
            "ISFJ": { title: "守護者", desc: "非常專注且溫暖的守護者，時刻準備保護他們愛的人. 你默默付出的特質讓你成為家庭與組織中最強大的後盾。", strengths: ["極其細心", "忠誠體貼", "實幹精神", "溫暖的同理心"], weaknesses: ["不善表達需求", "容易過度負重", "抗拒新事物", "內在較脆弱"], career: "護理師、幼教老師、行政主管、社工人員。", partner: "懂得感恩其付出者. 最契合 64 型：[ESTP-A-C] (行動力強) 或 [ESFJ-O-H] (社交核心)." },
            "ESTJ": { title: "總管", desc: "出色的管理人員，在管理事務或人方面無與倫比。你重視秩序與清晰，擅長將混亂的現狀轉化為條理分明的執行步驟。", strengths: ["組織力卓越", "高效率執行者", "領導力強", "穩定的價值觀"], weaknesses: ["缺乏彈性", "過度注重威權", "不理解非理性情緒", "主觀意識強"], career: "專案經理、營運長、財務長、軍警人員。", partner: "踏實且尊重秩序者. 最契合 64 型：[ISFP-O-H] (柔軟補足) 或 [ISTP-A-C] (技術支持)." },
            "ESFJ": { title: "執政官", desc: "極度關心他人、社交且受歡迎的人，總是熱衷於提供幫助. 你擅長創造和諧的社交環境，是團隊與朋友圈中的黏合劑。", strengths: ["社交天賦", "高度的責任感", "細膩的觀察力", "和諧守護者"], weaknesses: ["在意他人評價", "害怕孤單", "抗拒結構性改變", "容易自我犧牲"], career: "業務主管、醫護人員、活動主辦人、客服經理。", partner: "重視家庭與圈子者. 最契合 64 型：[ISFJ-O-H] (穩定後盾) 或 [ESTJ-A-C] (紀律領袖)." },
            "ISTP": { title: "鑒賞家", desc: "大膽且實際的實驗家，擅長使用各類工具. 你冷靜地觀察周遭，並以最具效率的方式解決眼前的實體難題。", strengths: ["危機應變力強", "高度好奇心", "實踐力強", "不受情緒左右"], weaknesses: ["難以捉摸", "容易感到無聊", "忽視個人情感", "對承諾感到焦慮"], career: "軟硬體工程師、數據分析師、機師、技術維修員。", partner: "獨立不黏人者. 最契合 64 型：[ESTJ-A-C] (組織領袖) 或 [ESFJ-O-H] (情感調節)." },
            "ISFP": { title: "探險家", desc: "靈活且有魅力的藝術家，時刻準備探索與體驗新鮮事物. 你活在當下，追求美感與個人的真實表達，討厭被框架束縛。", strengths: ["獨特的審美", "熱愛探索", "溫柔包容", "靈活度高"], weaknesses: ["抗拒長期計畫", "容易過度競爭", "低自尊傾向", "抗壓力較弱"], career: "室內設計師、攝影師、造型師、廚師。", partner: "懂欣賞獨特美感者. 最契合 64 型：[ENFJ-A-H] (溫暖引導) 或 [ESFJ-O-H] (社交中心)." },
            "ESTP": { title: "企業家", desc: "聰明、精力充沛且觀察力敏銳的人，真心享受冒險生活. 你動作迅速，擅長在動態的環境中捕捉機會，活在行動的前線。", strengths: ["決斷力強", "務實精神", "幽默有趣", "社交領袖"], weaknesses: ["忽視長期後果", "沒耐心", "不愛守規範", "情感層次較淺"], career: "銷售總監、急救人員、創業家、運動員。", partner: "充滿活力且不拘小節者. 最契合 64 型：[ISFJ-O-H] (溫柔守護) 或 [ISTJ-A-C] (秩序中心)." },
            "ESFP": { title: "表演者", desc: "自發、精力充沛且熱情的表演者. 你具備極強的娛樂精神與感染力，能瞬間點亮周圍的氛圍，享受與他人共享喜悅。", strengths: ["樂觀開朗", "極佳的社交力", "活在當下", "感官敏敏銳"], weaknesses: ["缺乏深度思考", "逃避問題", "追求瞬間刺激", "計畫性差"], career: "演員、旅遊公關、品牌大使、活動主持。", partner: "熱情外向且願相隨者. 最契合 64 型：[ISTJ-A-C] (冷靜支柱) 或 [ISFJ-O-H] (細心伴侶)." }
        };

        const INDICATOR_DETAILS = {
            EI: { title: "能量取向 (E vs I)", left: "I (內向)", right: "E (外向)", desc: "決定你從哪裡獲得能量。(E) 外向者傾向在互動中充電，(I) 內向者則在獨處中復原。" },
            SN: { title: "感知方式 (S vs N)", left: "N (直覺)", right: "S (實感)", desc: "決定你如何處理資訊。(S) 實感者關注細節與現狀，(N) 直覺者關注大局與未來可能性。" },
            TF: { title: "決策基礎 (T vs F)", left: "F (情感)", right: "T (思考)", desc: "決定你如何做出決定。(T) 思考者偏好客觀邏輯，(F) 情感者更在意價值觀與他人感受。" },
            JP: { title: "生活態度 (J vs P)", left: "P (感知)", right: "J (判斷)", desc: "決定你對外部世界的反應。(J) 判斷者追求計畫與控制，(P) 感知者偏好靈活與隨興。" },
            AO: { title: "決策風格 (A vs O)", left: "O (深思)", right: "A (果斷)", desc: "(O) 深思型在行動前反覆推演風險，(A) 果斷型則在壓力下依然能迅速且自信地前進。" },
            HC: { title: "社交溫度 (H vs C)", left: "C (高冷)", right: "H (溫暖)", desc: "(C) 高冷型在社交中維持理智與邊界，(H) 溫暖型則展現極高的同理心與情感包容度。" }
        };

        const App = () => {
            const [status, setStatus] = useState('start');
            const [currentPage, setCurrentPage] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isExporting, setIsExporting] = useState(false);
            
            const itemsPerPage = 5;
            const totalPages = Math.ceil(QUESTIONS.length / itemsPerPage);
            const progress = Math.round((Object.keys(answers).length / QUESTIONS.length) * 100);

            const handleAnswer = (qid, val) => { setAnswers(prev => ({ ...prev, [qid]: val })); };
            const scrollToTop = () => { window.scrollTo({ top: 0, behavior: 'smooth' }); };
            
            const goToNext = () => { 
                if (currentPage < totalPages - 1) { 
                    setCurrentPage(c => c + 1); 
                    setTimeout(scrollToTop, 50); 
                } else { 
                    setStatus('result'); 
                    setTimeout(scrollToTop, 50); 
                } 
            };
            
            const goToPrev = () => { 
                setCurrentPage(c => c - 1); 
                setTimeout(scrollToTop, 50); 
            };

            const calculateResults = useMemo(() => {
                if (status !== 'result') return null;
                const scores = { EI: 0, SN: 0, TF: 0, JP: 0, AO: 0, HC: 0 };
                const counts = { EI: 0, SN: 0, TF: 0, JP: 0, AO: 0, HC: 0 };
                QUESTIONS.forEach(q => { 
                    const ans = answers[q.id]; 
                    if (ans) { 
                        scores[q.axis] += (ans - 3) * q.dir; 
                        counts[q.axis] += 1; 
                    } 
                });
                const getCode = (axis, left, right) => scores[axis] >= 0 ? right : left;
                const base = getCode('EI','I','E') + getCode('SN','N','S') + getCode('TF','F','T') + getCode('JP','P','J');
                return {
                    fullCode: `${base}-${getCode('AO','O','A')}-${getCode('HC','C','H')}`,
                    baseCode: base, ao: getCode('AO','O','A'), hc: getCode('HC','C','H'),
                    percentages: Object.keys(scores).reduce((acc, k) => {
                        let rightPerc = Math.round(((scores[k] / (counts[k] || 1) + 2) / 4) * 100);
                        if (rightPerc < 0) rightPerc = 0; if (rightPerc > 100) rightPerc = 100;
                        acc[k] = rightPerc; return acc;
                    }, {})
                };
            }, [status, answers]);

            const getOptionColor = (val, isSelected) => {
                if (!isSelected) return 'border-white/20 bg-transparent';
                switch(val) {
                    case 1: return 'bg-red-600 border-red-500 shadow-[0_0_15px_rgba(220,38,38,0.6)]'; 
                    case 2: return 'bg-orange-600/80 border-orange-500 shadow-[0_0_10px_rgba(234,88,12,0.3)]'; 
                    case 3: return 'bg-gray-500 border-gray-400'; 
                    case 4: return 'bg-emerald-500 border-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.3)]'; 
                    case 5: return 'bg-blue-500 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.6)]'; 
                    default: return 'bg-white border-white';
                }
            };

            const downloadPDF = async () => {
                setIsExporting(true);
                try {
                    const element = document.getElementById('pdf-report-container');
                    
                    // Create high-res canvas of the entire result container
                    const canvas = await window.html2canvas(element, { 
                        backgroundColor: '#050508', 
                        scale: 2, 
                        useCORS: true, 
                        logging: false,
                        windowWidth: 1200 // Fix width for consistent scaling
                    });

                    const imgWidth = 210; // A4 width in mm
                    const pageHeight = 297; // A4 height in mm
                    const canvasWidth = canvas.width;
                    const canvasHeight = canvas.height;
                    
                    // Calculated height of the image on the PDF page based on aspect ratio
                    const imgHeight = (canvasHeight * imgWidth) / canvasWidth;
                    
                    const pdf = new window.jspdf.jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
                    
                    let position = 0;
                    let heightLeft = imgHeight;

                    // Adding first page
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;

                    // If content overflows one page, add subsequent pages by shifting the image offset
                    while (heightLeft > 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, position, imgWidth, imgHeight);
                        heightLeft -= pageHeight;
                    }

                    pdf.save(`64型性格報告_${calculateResults.fullCode}.pdf`);
                } catch (error) { 
                    console.error("PDF Export Error:", error); 
                } finally { 
                    setIsExporting(false); 
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center py-10 w-full px-4">
                    {status === 'start' && (
                        <div className="text-center max-w-2xl animate-fade-in no-print">
                            <div className="mb-8 inline-block p-6 rounded-full bg-blue-500/10 text-blue-400">
                                <Icon name="sparkles" className="w-16 h-16" />
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black tracking-tighter mb-6">64型人格測驗</h1>
                            <p className="text-gray-400 text-lg mb-10 leading-relaxed">
                                結合經典 MBTI 與進階行為維度，提供最完整的內在透視。<br/>
                                透過 100 題深層題目，探索更真實、更具體的自己。
                            </p>
                            <button onClick={() => { setStatus('quiz'); scrollToTop(); }} className="px-12 py-5 bg-white text-black font-black rounded-full text-xl hover:scale-105 transition-all shadow-xl">
                                開始探索 →
                            </button>
                        </div>
                    )}

                    {status === 'quiz' && (
                        <div className="w-full max-w-2xl animate-fade-in no-print">
                            <div className="sticky top-4 z-50 mb-10 bg-[#050508]/80 backdrop-blur-lg border border-white/10 p-4 rounded-2xl">
                                <div className="flex justify-between text-xs mb-2 font-mono text-blue-400">
                                    <span>進度: {progress}%</span>
                                    <span>頁數 {currentPage + 1}/{totalPages}</span>
                                </div>
                                <div className="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-rose-500 via-blue-500 to-cyan-500 transition-all duration-500" style={{width: `${progress}%`}} />
                                </div>
                            </div>
                            {QUESTIONS.slice(currentPage * itemsPerPage, (currentPage + 1) * itemsPerPage).map((q, index) => {
                                const questionNumber = (currentPage * itemsPerPage) + index + 1;
                                return (
                                    <div key={q.id} className="mb-6 p-8 bg-white/[0.03] rounded-[2rem] border border-white/5">
                                        <p className="text-xl font-medium mb-10 leading-snug">
                                            <span className="text-white font-black mr-2 font-mono">{questionNumber}.</span>
                                            {q.text}
                                        </p>
                                        <div className="flex items-center justify-between px-2">
                                            <span className="text-sm md:text-base text-red-500 font-black uppercase tracking-tighter">不同意</span>
                                            <div className="flex items-center gap-3 md:gap-6">
                                                {[1, 2, 3, 4, 5].map(v => (
                                                    <button key={`${q.id}-${v}`} type="button" onClick={() => handleAnswer(q.id, v)} className={`option-dot rounded-full border-2 ${v===1||v===5?'w-10 h-10 md:w-12 md:h-12':'w-8 h-8 md:w-10 md:h-10'} ${getOptionColor(v, answers[q.id]===v)}`}>
                                                        {answers[q.id] === v && <Icon name="check" className={`${v===1||v===5?'w-6 h-6':'w-4 h-4'} text-white`} />}
                                                    </button>
                                                ))}
                                            </div>
                                            <span className="text-sm md:text-base text-blue-500 font-black uppercase tracking-tighter">同意</span>
                                        </div>
                                    </div>
                                );
                            })}
                            <div className="flex gap-4 mt-8">
                                {currentPage > 0 && <button onClick={goToPrev} className="p-5 bg-white/5 rounded-2xl border border-white/10 hover:bg-white/10 transition-colors"><Icon name="arrow-left" /></button>}
                                <button disabled={QUESTIONS.slice(currentPage*itemsPerPage, (currentPage+1)*itemsPerPage).some(q => !answers[q.id])} onClick={goToNext} className="flex-1 bg-white text-black font-black py-5 rounded-2xl disabled:opacity-30 hover:bg-gray-100 transition-colors shadow-lg">
                                    {currentPage === totalPages - 1 ? "查看分析結果" : "繼續下一頁"}
                                </button>
                            </div>
                        </div>
                    )}

                    {status === 'result' && (
                        <div className="w-full max-w-4xl animate-fade-in text-center">
                            <div id="pdf-report-container" className="p-8 md:p-14 bg-[#050508] rounded-[3rem] border border-white/10 shadow-2xl relative overflow-hidden text-white">
                                <div className="mb-10">
                                    <p className="text-blue-400 font-mono tracking-widest text-sm mb-4">64型人格個人分析報告</p>
                                    <h2 className="text-6xl md:text-8xl font-black mb-4 tracking-tighter">{calculateResults.fullCode}</h2>
                                    <h3 className="text-3xl md:text-4xl font-bold text-white/90 mb-12">
                                        {PERSONALITY_MAP[calculateResults.baseCode]?.title}
                                        <span className="mx-4 opacity-20">|</span>
                                        <span className="text-lg font-medium opacity-60">
                                            {calculateResults.ao==='A'?'果斷型':'深思型'} · {calculateResults.hc==='H'?'溫暖型':'高冷型'}
                                        </span>
                                    </h3>
                                </div>

                                <div className="mb-10 p-8 bg-white/5 rounded-3xl border border-white/5 text-left">
                                    <div className="flex items-center gap-3 mb-4 text-blue-400"><Icon name="user" className="w-6 h-6" /><h4 className="text-xl font-bold">核心性格解讀</h4></div>
                                    <p className="text-gray-300 leading-relaxed text-lg mb-6">{PERSONALITY_MAP[calculateResults.baseCode]?.desc}</p>
                                    <div className="grid md:grid-cols-2 gap-4 border-t border-white/10 pt-6">
                                        <div>
                                            <h5 className="text-sm font-bold text-emerald-400 mb-2">● 決策風格：{calculateResults.ao === 'A' ? '果斷型 (Assertive)' : '深思型 (Observant)'}</h5>
                                            <p className="text-sm text-gray-400">{calculateResults.ao === 'A' ? "面對決策時，你具備較高的心理穩定性，在壓力下依然能自信地前進，不易被自我懷疑困擾。" : "你具備極佳的風險察覺能力. 雖然決策前會反覆考量，但這也讓你的行動通常更加精確且避開了潛在陷阱。"}</p>
                                        </div>
                                        <div>
                                            <h5 className="text-sm font-bold text-orange-400 mb-2">● 社交溫度：{calculateResults.hc === 'H' ? '溫暖型 (Warm)' : '高冷型 (Cold)'}</h5>
                                            <p className="text-sm text-gray-400">{calculateResults.hc === 'H' ? "你展現出高度的同理心，天生擅長提供情緒支持. 你的人際連結通常更具溫情與包容力。" : "你偏好理性的社交距離. 在群體中能維持客觀的中立立場，這讓你更不易受情緒化因素影響，擁有獨特的冷靜領袖氣質。"}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-6 mb-10">
                                    <div className="p-8 bg-emerald-500/5 rounded-3xl border border-emerald-500/10 text-left">
                                        <div className="flex items-center gap-3 mb-5 text-emerald-400"><Icon name="shield" className="w-6 h-6" /><h4 className="text-xl font-bold">天賦與強項</h4></div>
                                        <ul className="space-y-3">{PERSONALITY_MAP[calculateResults.baseCode]?.strengths.map((s, idx) => (<li key={idx} className="flex items-start gap-2 text-gray-300"><span className="mt-1.5 w-1.5 h-1.5 rounded-full bg-emerald-500 shrink-0" /><span>{s}</span></li>))}</ul>
                                    </div>
                                    <div className="p-8 bg-rose-500/5 rounded-3xl border border-rose-500/10 text-left">
                                        <div className="flex items-center gap-3 mb-5 text-rose-400"><Icon name="alert" className="w-6 h-6" /><h4 className="text-xl font-bold">盲點與弱勢</h4></div>
                                        <ul className="space-y-3">{PERSONALITY_MAP[calculateResults.baseCode]?.weaknesses.map((w, idx) => (<li key={idx} className="flex items-start gap-2 text-gray-300"><span className="mt-1.5 w-1.5 h-1.5 rounded-full bg-rose-500 shrink-0" /><span>{w}</span></li>))}</ul>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 text-left mb-10">
                                    {Object.entries(INDICATOR_DETAILS).map(([key, info]) => {
                                        const rightPerc = calculateResults.percentages[key]; const leftPerc = 100 - rightPerc;
                                        return (
                                            <div key={key} className="p-6 bg-white/5 rounded-2xl border border-white/5">
                                                <div className="flex justify-center items-center mb-4"><span className="font-black text-blue-400 text-sm tracking-wide">{info.title}</span></div>
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className="flex flex-col items-center min-w-[40px]"><span className="text-[10px] font-bold text-gray-400 uppercase">{info.left.split(' ')[0]}</span><span className="text-sm font-mono font-bold text-rose-400">{leftPerc}%</span></div>
                                                    <div className="flex-1 h-2 bg-white/5 rounded-full overflow-hidden flex"><div className="h-full bg-rose-500/80 transition-all" style={{width: `${leftPerc}%`}}></div><div className="h-full bg-cyan-500/80 transition-all" style={{width: `${rightPerc}%`}}></div></div>
                                                    <div className="flex flex-col items-center min-w-[40px]"><span className="text-[10px] font-bold text-gray-400 uppercase">{info.right.split(' ')[0]}</span><span className="text-sm font-mono font-bold text-cyan-400">{rightPerc}%</span></div>
                                                </div>
                                                <p className="text-[11px] text-gray-500 leading-relaxed border-t border-white/5 pt-3">{info.desc}</p>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="grid md:grid-cols-2 gap-6 text-left">
                                    <div className="p-6 bg-blue-500/10 rounded-3xl border border-blue-500/20">
                                        <h4 className="font-bold text-blue-400 mb-3 flex items-center gap-2"><Icon name="briefcase" className="w-5 h-5" /> 建議職業</h4>
                                        <p className="text-sm text-gray-300 leading-relaxed">{PERSONALITY_MAP[calculateResults.baseCode]?.career}</p>
                                    </div>
                                    <div className="p-6 bg-rose-500/10 rounded-3xl border border-rose-500/20">
                                        <h4 className="font-bold text-rose-400 mb-3 flex items-center gap-2"><Icon name="heart" className="w-5 h-5" /> 契合人格</h4>
                                        <p className="text-sm text-gray-300 leading-relaxed">{PERSONALITY_MAP[calculateResults.baseCode]?.partner}</p>
                                    </div>
                                </div>
                                
                                <div className="text-center mt-12 text-xs text-gray-600 font-mono">
                                    報告日期：{new Date().toLocaleDateString()} · 64型人格分析系統
                                </div>
                            </div>

                            <div className="mt-10 flex flex-wrap gap-4 justify-center no-print">
                                <button onClick={downloadPDF} disabled={isExporting} className={`px-10 py-4 bg-blue-600 text-white font-bold rounded-full transition-all flex items-center gap-2 ${isExporting ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-700'}`}>
                                    <Icon name="download" className="w-5 h-5" /> {isExporting ? '生成報告中...' : '下載報告 (PDF)'}
                                </button>
                                <button onClick={() => { setStatus('start'); setAnswers({}); setCurrentPage(0); scrollToTop(); }} className="px-10 py-4 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all text-sm font-bold">重啟測驗</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
